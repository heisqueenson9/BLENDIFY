<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#C5E710" opacity="0.1" stroke="#C5E710" stroke-width="2"/>
  
  <!-- Support icon -->
  <g transform="translate(100, 100)">
    <!-- Headset circle -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#8E9630" stroke-width="3"/>
    
    <!-- Left ear cup -->
    <circle cx="-25" cy="10" r="12" fill="#C5E710" stroke="#607423" stroke-width="2"/>
    
    <!-- Right ear cup -->
    <circle cx="25" cy="10" r="12" fill="#C5E710" stroke="#607423" stroke-width="2"/>
    
    <!-- Headband -->
    <path d="M -20 0 Q -15 -20 0 -25 Q 15 -20 20 0" fill="none" stroke="#8E9630" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Microphone boom -->
    <path d="M -25 22 L -28 40" fill="none" stroke="#607423" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-28" cy="45" r="4" fill="#F4DF6B" stroke="#607423" stroke-width="1.5"/>
    
    <!-- Smile/happy indicator -->
    <path d="M -15 15 Q 0 25 15 15" fill="none" stroke="#607423" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
