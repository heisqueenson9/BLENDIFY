<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#C5E710" opacity="0.1" stroke="#C5E710" stroke-width="2"/>
  
  <!-- Delivery truck/fast icon -->
  <g transform="translate(100, 100)">
    <!-- Truck body -->
    <rect x="-40" y="-15" width="50" height="30" rx="4" fill="#8E9630" stroke="#607423" stroke-width="2"/>
    
    <!-- Cabin -->
    <rect x="-50" y="-20" width="15" height="35" rx="3" fill="#C5E710" stroke="#607423" stroke-width="2"/>
    
    <!-- Window -->
    <rect x="-48" y="-15" width="10" height="10" fill="#F4DF6B" opacity="0.6" stroke="#607423" stroke-width="1"/>
    
    <!-- Wheels -->
    <circle cx="-35" cy="20" r="7" fill="#010A00" stroke="#607423" stroke-width="1.5"/>
    <circle cx="25" cy="20" r="7" fill="#010A00" stroke="#607423" stroke-width="1.5"/>
    
    <!-- Speed lines -->
    <line x1="-60" y1="-5" x2="-70" y2="-5" stroke="#8E9630" stroke-width="3" stroke-linecap="round"/>
    <line x1="-60" y1="5" x2="-75" y2="5" stroke="#8E9630" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-60" y1="15" x2="-70" y2="15" stroke="#8E9630" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
