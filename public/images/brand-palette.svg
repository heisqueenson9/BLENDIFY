<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Title Section -->
  <rect width="1200" height="120" fill="#010A00"/>
  <text x="60" y="70" font-size="48" font-weight="bold" fill="#C5E710" font-family="DM Sans">
    BLENDIFY BRAND PALETTE
  </text>
  <text x="60" y="105" font-size="18" fill="#F4DF6B" font-family="DM Sans" opacity="0.8">
    Complete Color System & Design Reference
  </text>
  
  <!-- Primary Color -->
  <g>
    <rect x="60" y="160" width="200" height="200" fill="#C5E710" stroke="#010A00" stroke-width="2"/>
    <text x="270" y="185" font-size="14" font-weight="bold" fill="#010A00" font-family="DM Sans">
      PRIMARY LIME
    </text>
    <text x="270" y="210" font-size="12" fill="#666" font-family="DM Sans">
      HEX: #C5E710
    </text>
    <text x="270" y="230" font-size="12" fill="#666" font-family="DM Sans">
      RGB: 197, 231, 16
    </text>
    <text x="270" y="250" font-size="12" fill="#666" font-family="DM Sans">
      Usage: Primary buttons, accents
    </text>
    <text x="270" y="270" font-size="12" fill="#666" font-family="DM Sans">
      Backgrounds, hover states
    </text>
    <text x="270" y="310" font-size="11" fill="#999" font-family="DM Sans" font-style="italic">
      The primary brand color - vibrant, energetic, modern
    </text>
  </g>
  
  <!-- Secondary Color -->
  <g>
    <rect x="560" y="160" width="200" height="200" fill="#8E9630" stroke="#010A00" stroke-width="2"/>
    <text x="770" y="185" font-size="14" font-weight="bold" fill="#ffffff" font-family="DM Sans">
      SECONDARY OLIVE
    </text>
    <text x="770" y="210" font-size="12" fill="#ffffff" font-family="DM Sans">
      HEX: #8E9630
    </text>
    <text x="770" y="230" font-size="12" fill="#ffffff" font-family="DM Sans">
      RGB: 142, 150, 48
    </text>
    <text x="770" y="250" font-size="12" fill="#ffffff" font-family="DM Sans">
      Usage: Secondary elements
    </text>
    <text x="770" y="270" font-size="12" fill="#ffffff" font-family="DM Sans">
      Text, borders, accents
    </text>
    <text x="770" y="310" font-size="11" fill="#cccccc" font-family="DM Sans" font-style="italic">
      Earthy, premium, sustainable tone
    </text>
  </g>
  
  <!-- Accent Color -->
  <g>
    <rect x="1060" y="160" width="140" height="200" fill="#F4DF6B" stroke="#010A00" stroke-width="2"/>
    <text x="60" y="420" font-size="14" font-weight="bold" fill="#010A00" font-family="DM Sans">
      ACCENT LIGHT
    </text>
    <text x="60" y="445" font-size="12" fill="#666" font-family="DM Sans">
      HEX: #F4DF6B
    </text>
    <text x="60" y="465" font-size="12" fill="#666" font-family="DM Sans">
      RGB: 244, 223, 107
    </text>
    <text x="60" y="485" font-size="12" fill="#666" font-family="DM Sans">
      Highlights, warm tones
    </text>
  </g>
  
  <!-- Neutrals & Extended Palette -->
  <text x="60" y="380" font-size="16" font-weight="bold" fill="#010A00" font-family="DM Sans">
    EXTENDED PALETTE
  </text>
  
  <!-- Black -->
  <rect x="60" y="410" width="80" height="80" fill="#010A00" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="510" font-size="12" font-weight="600" fill="#010A00" font-family="DM Sans">
    Black
  </text>
  <text x="60" y="530" font-size="11" fill="#666" font-family="DM Sans">
    #010A00
  </text>
  
  <!-- Dark Grey -->
  <rect x="160" y="410" width="80" height="80" fill="#333333" stroke="#ccc" stroke-width="1"/>
  <text x="160" y="510" font-size="12" font-weight="600" fill="#010A00" font-family="DM Sans">
    Dark Grey
  </text>
  <text x="160" y="530" font-size="11" fill="#666" font-family="DM Sans">
    #333333
  </text>
  
  <!-- Medium Grey -->
  <rect x="260" y="410" width="80" height="80" fill="#666666" stroke="#ccc" stroke-width="1"/>
  <text x="260" y="510" font-size="12" font-weight="600" fill="#010A00" font-family="DM Sans">
    Medium
  </text>
  <text x="260" y="530" font-size="11" fill="#666" font-family="DM Sans">
    #666666
  </text>
  
  <!-- Light Grey -->
  <rect x="360" y="410" width="80" height="80" fill="#CCCCCC" stroke="#ccc" stroke-width="1"/>
  <text x="360" y="510" font-size="12" font-weight="600" fill="#010A00" font-family="DM Sans">
    Light Grey
  </text>
  <text x="360" y="530" font-size="11" fill="#666" font-family="DM Sans">
    #CCCCCC
  </text>
  
  <!-- Off White -->
  <rect x="460" y="410" width="80" height="80" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="460" y="510" font-size="12" font-weight="600" fill="#010A00" font-family="DM Sans">
    Off White
  </text>
  <text x="460" y="530" font-size="11" fill="#666" font-family="DM Sans">
    #F5F5F5
  </text>
  
  <!-- White -->
  <rect x="560" y="410" width="80" height="80" fill="#FFFFFF" stroke="#999" stroke-width="2"/>
  <text x="560" y="510" font-size="12" font-weight="600" fill="#010A00" font-family="DM Sans">
    White
  </text>
  <text x="560" y="530" font-size="11" fill="#666" font-family="DM Sans">
    #FFFFFF
  </text>
  
  <!-- Typography Section -->
  <text x="60" y="610" font-size="16" font-weight="bold" fill="#010A00" font-family="DM Sans">
    TYPOGRAPHY
  </text>
  
  <!-- Font 1 -->
  <text x="60" y="650" font-size="28" font-weight="bold" fill="#010A00" font-family="Bebas Neue">
    BEBAS NEUE
  </text>
  <text x="60" y="675" font-size="12" fill="#666" font-family="DM Sans">
    Display, Headlines, Emphasis
  </text>
  
  <!-- Font 2 -->
  <text x="400" y="650" font-size="20" font-weight="600" fill="#010A00" font-family="DM Sans">
    DM Sans (Primary)
  </text>
  <text x="400" y="675" font-size="12" fill="#666" font-family="DM Sans">
    Body text, UI, Navigation | Weights: 400, 500, 600, 700
  </text>
  
  <!-- Font 3 -->
  <text x="60" y="730" font-size="20" font-weight="600" fill="#010A00" font-family="Playfair Display" font-style="italic">
    Playfair Display Italic
  </text>
  <text x="60" y="755" font-size="12" fill="#666" font-family="DM Sans">
    Testimonials, Quotes, Elegant sections
  </text>
  
  <!-- Design Elements -->
  <text x="900" y="610" font-size="16" font-weight="bold" fill="#010A00" font-family="DM Sans">
    KEY ELEMENTS
  </text>
  
  <!-- Rounded corners example -->
  <rect x="900" y="640" width="60" height="60" rx="12" fill="#C5E710" stroke="#010A00" stroke-width="2"/>
  <text x="970" y="665" font-size="12" fill="#010A00" font-family="DM Sans">
    Rounded Corners
  </text>
  <text x="970" y="685" font-size="11" fill="#666" font-family="DM Sans">
    radius: 12px
  </text>
  
  <!-- Shadow effect -->
  <rect x="900" y="730" width="60" height="60" fill="#C5E710" stroke="#010A00" stroke-width="2" 
        style="filter: drop-shadow(0 4px 12px rgba(1, 10, 0, 0.2))"/>
  <text x="970" y="755" font-size="12" fill="#010A00" font-family="DM Sans">
    Soft Shadows
  </text>
  <text x="970" y="775" font-size="11" fill="#666" font-family="DM Sans">
    Depth & elevation
  </text>
</svg>
