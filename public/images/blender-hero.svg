<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5E710;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E9630;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="blenderGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#F4DF6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5E710;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#heroBg)"/>
  
  <!-- Blender Base Shadow -->
  <ellipse cx="200" cy="320" rx="100" ry="20" fill="#010A00" opacity="0.15"/>
  
  <!-- Blender Body -->
  <g transform="translate(200, 150)">
    <!-- Motor unit (top) -->
    <rect x="-45" y="-80" width="90" height="50" rx="8" fill="url(#blenderGradient)" stroke="#8E9630" stroke-width="2"/>
    
    <!-- Blender head detail -->
    <circle cx="0" cy="-50" r="30" fill="#C5E710" stroke="#607423" stroke-width="2"/>
    
    <!-- Blade housing -->
    <rect x="-25" y="-40" width="50" height="60" rx="4" fill="#F4DF6B" stroke="#8E9630" stroke-width="2"/>
    
    <!-- Blades (stylized) -->
    <g fill="#607423" opacity="0.7">
      <polygon points="0,-20 -8,-5 0,0 8,-5"/>
      <polygon points="0,-20 -12,-10 -8,-5"/>
      <polygon points="0,-20 12,-10 8,-5"/>
    </g>
    
    <!-- Cup/Container -->
    <path d="M -35 25 L -30 100 Q -30 110 -20 110 L 20 110 Q 30 110 30 100 L 35 25" 
          fill="#F4DF6B" stroke="#8E9630" stroke-width="2"/>
    
    <!-- Liquid inside cup -->
    <path d="M -28 45 L -26 95 Q -26 105 -18 105 L 18 105 Q 26 105 26 95 L 28 45" 
          fill="#C5E710" opacity="0.6"/>
    
    <!-- Cup rim -->
    <ellipse cx="0" cy="25" rx="36" ry="8" fill="#8E9630" stroke="#607423" stroke-width="1"/>
  </g>
  
  <!-- Decorative Elements (leaves) -->
  <g fill="#607423" opacity="0.3">
    <ellipse cx="80" cy="100" rx="15" ry="8" transform="rotate(-45 80 100)"/>
    <ellipse cx="320" cy="180" rx="12" ry="6" transform="rotate(30 320 180)"/>
  </g>
  
  <!-- Shine/Highlight on blender -->
  <ellipse cx="165" cy="100" rx="20" ry="30" fill="#ffffff" opacity="0.2"/>
</svg>
