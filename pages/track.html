<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Blendify portable blenders for healthy living">
  <title>Track Order – Blendify</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/loader.css"/>
  <link rel="icon" href="../public/images/favicon.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
  <style>
    .track-container { max-width:600px; margin:60px auto; }
    .track-form { background:var(--gray-50); padding:40px; border-radius:var(--radius-lg); border:1px solid var(--gray-200); }
    .track-form h2 { font-family:var(--font-display); font-size:1.6rem; letter-spacing:1px; margin-bottom:24px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-weight:700; margin-bottom:8px; }
    .form-group input { width:100%; padding:12px 16px; border:1px solid var(--gray-200); border-radius:var(--radius-sm); font-family:var(--font-body); outline:none; }
    .form-group input:focus { border-color:var(--lime); }
  </style>
</head>
<body>
  <div id="globalLoader" class="loader-wrapper"><div class="loader"></div></div>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 28 28"><path d="M14 2C8 2 4 10 4 17a10 10 0 0020 0C24 10 20 2 14 2z" fill="#C5E710"/><path d="M10 18 Q14 10 18 18" stroke="#010A00" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        BLENDIFY
      </a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>TRACK YOUR ORDER</h1>
      <p>Enter your tracking number or order ID to see the status of your Blendify delivery</p>
      <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span>Track Order</div>
    </div>
  </div>

  <div class="container">
    <div class="track-container">
      <form class="track-form" onsubmit="trackOrder(event)">
        <h2>TRACK SHIPMENT</h2>
        <div class="form-group">
          <label for="trackNum">Tracking Number or Order ID</label>
          <input type="text" id="trackNum" placeholder="E.g., BL-20250112-001" required/>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;padding:14px;">Track Package</button>
      </form>

      <div style="text-align:center;margin-top:60px;padding:40px;background:var(--gray-50);border-radius:var(--radius-lg);">
        <p style="color:var(--text-muted);margin-bottom:24px;">Didn't receive a tracking number?</p>
        <a href="contact.html" class="btn-outline">Contact Support</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <span>© 2025 Blendify. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script defer src="../js/main.js"></script>
  <script>
    function trackOrder(e) {
      e.preventDefault();
      const trackNum = document.getElementById("trackNum").value;
      alert(`Demo: Tracking number ${trackNum}\n\nIn production, this would show real tracking status from our logistics partner.`);
    }
  </script>
</body>
</html>
