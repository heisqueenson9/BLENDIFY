<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Blendify portable blenders for healthy living">
  <title>Account – Blendify</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/loader.css"/>
  <link rel="icon" href="../public/images/favicon.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
  <style>
    .auth-container { max-width:500px; margin:60px auto; padding:40px; background:var(--gray-50); border-radius:var(--radius-lg); border:1px solid var(--gray-200); }
    .auth-container h2 { font-family:var(--font-display); font-size:1.8rem; letter-spacing:2px; margin-bottom:28px; text-align:center; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-weight:700; margin-bottom:8px; font-size:.9rem; }
    .form-group input { width:100%; padding:12px 16px; border:1px solid var(--gray-200); border-radius:var(--radius-sm); font-size:.95rem; font-family:var(--font-body); outline:none; transition:border .2s; }
    .form-group input:focus { border-color:var(--lime); }
    .btn-login { width:100%; margin-top:24px; }
    .auth-footer { text-align:center; margin-top:20px; }
    .auth-footer p { font-size:.9rem; color:var(--text-muted); }
    .auth-footer a { color:var(--lime); font-weight:700; }
  </style>
</head>
<body>
  <div id="globalLoader" class="loader-wrapper"><div class="loader"></div></div>

  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 28 28"><path d="M14 2C8 2 4 10 4 17a10 10 0 0020 0C24 10 20 2 14 2z" fill="#C5E710"/><path d="M10 18 Q14 10 18 18" stroke="#010A00" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        BLENDIFY
      </a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>ACCOUNT</h1>
      <p>Sign in to your account to track orders and manage preferences</p>
      <div class="breadcrumb"><a href="../index.html">Home</a><span>/</span>Account</div>
    </div>
  </div>

  <div class="container">
    <div class="auth-container">
      <h2>SIGN IN</h2>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn-primary btn-login">Sign In</button>
      </form>
      <div class="auth-footer">
        <p>Don't have an account? <a href="#" onclick="toggleForm(event)">Create one</a></p>
        <p><a href="#" style="color:var(--text-muted);">Forgot password?</a></p>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <span>© 2025 Blendify. All rights reserved.</span>
        <div class="footer-legal">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
        </div>
      </div>
    </div>
  </footer>

  <script defer src="../js/main.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      alert("✓ Login feature coming soon! For now, orders are guest-based.");
    }
    function toggleForm(e) {
      e.preventDefault();
      alert("Registration feature coming soon!");
    }
  </script>
</body>
</html>
